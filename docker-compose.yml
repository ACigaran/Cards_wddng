services:

  postgres:
    image: postgres:17
    container_name: wedding_postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./back-wdg
      dockerfile: Dockerfile

    container_name: wedding_backend

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "${BACK_PORT}:${BACK_PORT}"

    volumes:
      - ./back-wdg:/app
      - /app/node_modules

    command: npm run dev

  frontend:
    build:
      context: ./front-wdg
      dockerfile: Dockerfile

    container_name: wedding_frontend

    depends_on:
      - backend

    env_file:
      - .env

    ports:
      - "${FRONT_PORT}:${FRONT_PORT}"

    volumes:
      - ./front-wdg:/app
      - /app/node_modules

    command: npm start

volumes:
  postgres_data: